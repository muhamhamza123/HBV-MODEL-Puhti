# /etc/nginx/conf.d/hbv.conf
#
# Reverse proxy for the HBV FastAPI gateway.
# Nginx terminates TLS and forwards to uvicorn on 127.0.0.1:8000.
#
# Install:
#   sudo cp deploy/nginx-hbv.conf /etc/nginx/conf.d/hbv.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you do not have a domain / cert yet, remove the ssl block and use
# plain HTTP on port 8000 (change listen 443 ssl -> listen 8080).

upstream hbv_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name hbv.we3data.com;

    ssl_certificate     /etc/letsencrypt/live/hbv.we3data.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hbv.we3data.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Generous timeouts for long-running uploads (large NetCDF)
    client_max_body_size    2G;
    client_body_timeout     600s;
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   10s;

    location / {
        proxy_pass         http://hbv_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Buffering off so incremental log lines reach the dashboard fast
        proxy_buffering    off;
    }

    # Health check — no auth required (used by monitoring)
    location /health {
        proxy_pass         http://hbv_api/health;
        proxy_http_version 1.1;
        access_log         off;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hbv.we3data.com;
    return 301 https://$host$request_uri;
}
