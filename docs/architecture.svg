<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace, sans-serif" font-size="12">
  <title>HBV Model — Puhti Architecture Flow</title>
  <desc>Shows how user requests flow from JupyterHub through the head node API to the Puhti supercomputer and back.</desc>

  <!-- Background zones -->
  <rect x="10" y="10" width="180" height="540" rx="10" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="100" y="32" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">USER / BROWSER</text>
  <text x="100" y="46" text-anchor="middle" fill="#334155" font-size="9">Puhti JupyterHub</text>

  <rect x="210" y="10" width="200" height="540" rx="10" fill="#0f172a" stroke="#065f46" stroke-width="1.5"/>
  <text x="310" y="32" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold">HEAD NODE</text>
  <text x="310" y="46" text-anchor="middle" fill="#334155" font-size="9">hbv.we3data.com</text>

  <rect x="430" y="10" width="380" height="540" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="620" y="32" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">PUHTI SUPERCOMPUTER</text>
  <text x="620" y="46" text-anchor="middle" fill="#334155" font-size="9">puhti.csc.fi — project_2014823</text>

  <!-- NFS Storage -->
  <rect x="220" y="460" width="180" height="70" rx="6" fill="#1e293b" stroke="#065f46" stroke-width="1"/>
  <text x="310" y="480" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold">NFS Storage</text>
  <text x="310" y="494" text-anchor="middle" fill="#64748b" font-size="9">/data/hbv/uploads/</text>
  <text x="310" y="506" text-anchor="middle" fill="#64748b" font-size="9">/data/hbv/output/</text>
  <text x="310" y="518" text-anchor="middle" fill="#64748b" font-size="9">/data/hbv/shapefiles/</text>

  <!-- User boxes -->
  <rect x="25" y="65" width="150" height="44" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="83" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">Dashboard UI</text>
  <text x="100" y="97" text-anchor="middle" fill="#64748b" font-size="9">hbv-frontend-puhti:v2</text>

  <rect x="25" y="135" width="150" height="44" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="153" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">① Upload Files</text>
  <text x="100" y="167" text-anchor="middle" fill="#64748b" font-size="9">NC, shapefile, params</text>

  <rect x="25" y="205" width="150" height="44" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="223" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">② Submit Job</text>
  <text x="100" y="237" text-anchor="middle" fill="#64748b" font-size="9">POST /submit :8001</text>

  <rect x="25" y="275" width="150" height="44" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="293" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">③ Poll Status</text>
  <text x="100" y="307" text-anchor="middle" fill="#64748b" font-size="9">GET /status every 5s</text>

  <rect x="25" y="345" width="150" height="44" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="363" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">④ Download Results</text>
  <text x="100" y="377" text-anchor="middle" fill="#64748b" font-size="9">CSV per catchment</text>

  <!-- Head Node boxes -->
  <rect x="225" y="65" width="170" height="44" rx="5" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="83" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold">FastAPI :8001</text>
  <text x="310" y="97" text-anchor="middle" fill="#64748b" font-size="9">hbv-api-puhti.service</text>

  <rect x="225" y="135" width="170" height="44" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="153" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold">Store to NFS</text>
  <text x="310" y="167" text-anchor="middle" fill="#64748b" font-size="9">/data/hbv/uploads/</text>

  <rect x="225" y="205" width="170" height="44" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="223" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold">rsync → Puhti</text>
  <text x="310" y="237" text-anchor="middle" fill="#64748b" font-size="9">via SSH key (hbv@head)</text>

  <rect x="225" y="275" width="170" height="44" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="293" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold">SSH sbatch</text>
  <text x="310" y="307" text-anchor="middle" fill="#64748b" font-size="9">puhti.py → squeue/scancel</text>

  <rect x="225" y="345" width="170" height="44" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="363" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold">rsync ← Puhti</text>
  <text x="310" y="377" text-anchor="middle" fill="#64748b" font-size="9">results → /data/hbv/output/</text>

  <rect x="225" y="415" width="170" height="34" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="310" y="437" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold">SQLite DB (jobs.db)</text>

  <!-- Puhti boxes -->
  <rect x="445" y="65" width="155" height="44" rx="5" fill="#2e1065" stroke="#7c3aed" stroke-width="1"/>
  <text x="523" y="83" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Login Node</text>
  <text x="523" y="97" text-anchor="middle" fill="#64748b" font-size="9">puhti-login*.csc.fi</text>

  <rect x="445" y="135" width="155" height="44" rx="5" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="523" y="153" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Slurm Scheduler</text>
  <text x="523" y="167" text-anchor="middle" fill="#64748b" font-size="9">partition: small</text>

  <rect x="445" y="205" width="155" height="64" rx="5" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="523" y="225" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Compute Nodes</text>
  <text x="523" y="239" text-anchor="middle" fill="#64748b" font-size="9">40 CPUs / 382GB each</text>
  <text x="523" y="253" text-anchor="middle" fill="#64748b" font-size="9">hbv_run_puhti.sh</text>

  <rect x="445" y="290" width="155" height="54" rx="5" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="523" y="310" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Apptainer Container</text>
  <text x="523" y="324" text-anchor="middle" fill="#64748b" font-size="9">hbv-compute.sif</text>
  <text x="523" y="338" text-anchor="middle" fill="#64748b" font-size="9">hbv_worker.py</text>

  <rect x="620" y="205" width="175" height="139" rx="5" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="708" y="225" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">Puhti Scratch</text>
  <text x="708" y="242" text-anchor="middle" fill="#64748b" font-size="9">/scratch/project_2014823/hbv/</text>
  <text x="708" y="258" text-anchor="middle" fill="#475569" font-size="9">uploads/</text>
  <text x="708" y="272" text-anchor="middle" fill="#475569" font-size="9">shapefiles/</text>
  <text x="708" y="286" text-anchor="middle" fill="#475569" font-size="9">output/</text>
  <text x="708" y="300" text-anchor="middle" fill="#475569" font-size="9">logs/</text>
  <text x="708" y="314" text-anchor="middle" fill="#475569" font-size="9">hbv-compute.sif</text>
  <text x="708" y="328" text-anchor="middle" fill="#475569" font-size="9">hbv_run_puhti.sh</text>

  <!-- Arrows -->
  <line x1="175" y1="157" x2="225" y2="157" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="175" y1="227" x2="225" y2="227" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="175" y1="297" x2="225" y2="297" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <line x1="225" y1="367" x2="175" y2="367" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="310" y1="179" x2="310" y2="460" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M395 227 Q415 227 445 227" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arr-yellow)"/>
  <text x="420" y="222" text-anchor="middle" fill="#f59e0b" font-size="8">rsync</text>
  <path d="M395 297 Q415 87 445 87" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-yellow)"/>
  <text x="430" y="175" text-anchor="middle" fill="#f59e0b" font-size="8">SSH</text>
  <line x1="523" y1="109" x2="523" y2="135" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="523" y1="179" x2="523" y2="205" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="523" y1="269" x2="523" y2="290" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="600" y1="237" x2="620" y2="237" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="620" y1="257" x2="600" y2="257" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-purple)"/>
  <path d="M620 310 Q410 370 395 367" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="510" y="395" text-anchor="middle" fill="#10b981" font-size="8">rsync back</text>

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>
</svg>
